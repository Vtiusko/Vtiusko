name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: vtiusko
          outputs: |
            dist/github-snake.svg?color_snake=#38BDF8&color_dots=#0f172a,#1e3a8a,#2563eb,#38bdf8,#7dd3fc
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#38BDF8&color_dots=#0f172a,#1e293b,#1e40af,#0ea5e9,#7dd3fc

      - name: Push generated files
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}