name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: vtiusko
          outputs: |
            dist/github-snake.svg?color_snake=%2338BDF8&color_dots=%230f172a,%231e3a8a,%232563eb,%2338bdf8,%237dd3fc
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%2338BDF8&color_dots=%230f172a,%231e293b,%231e40af,%230ea5e9,%237dd3fc

      - name: Push generated files
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}